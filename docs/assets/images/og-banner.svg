<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4361ee"/>
      <stop offset="100%" style="stop-color:#7b8ff8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="200" fill="rgba(67,97,238,0.08)"/>
  <circle cx="200" cy="500" r="150" fill="rgba(123,143,248,0.06)"/>
  <circle cx="1050" cy="450" r="100" fill="rgba(67,97,238,0.05)"/>

  <!-- State machine diagram -->
  <g transform="translate(750, 280)" opacity="0.15">
    <!-- States -->
    <rect x="0" y="0" width="120" height="50" rx="25" fill="none" stroke="#7b8ff8" stroke-width="2"/>
    <rect x="180" y="0" width="120" height="50" rx="25" fill="none" stroke="#7b8ff8" stroke-width="2"/>
    <rect x="90" y="100" width="120" height="50" rx="25" fill="none" stroke="#7b8ff8" stroke-width="2"/>
    <!-- Arrows -->
    <line x1="120" y1="25" x2="180" y2="25" stroke="#7b8ff8" stroke-width="2"/>
    <line x1="240" y1="50" x2="210" y2="100" stroke="#7b8ff8" stroke-width="2"/>
    <line x1="90" y1="125" x2="60" y2="50" stroke="#7b8ff8" stroke-width="2"/>
  </g>

  <!-- Gear emoji area -->
  <text x="100" y="200" font-size="72" fill="white" opacity="0.9">&#x2699;&#xFE0F;</text>

  <!-- Title -->
  <text x="100" y="310" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">
    XState-StateMachine
  </text>

  <!-- Subtitle -->
  <text x="100" y="370" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.7)">
    The Complete State Machine Runtime for Python
  </text>

  <!-- Feature pills -->
  <g transform="translate(100, 410)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="70" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">XState-Compatible</text>

    <rect x="155" y="0" width="150" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="230" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Production-Ready</text>

    <rect x="320" y="0" width="140" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="390" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Zero Dependencies</text>

    <rect x="475" y="0" width="110" height="36" rx="18" fill="url(#accent)" opacity="0.3"/>
    <text x="530" y="23" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Python 3.9+</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.6"/>

  <!-- Version badge -->
  <text x="100" y="530" font-family="JetBrains Mono, monospace" font-size="16" font-weight="500" fill="rgba(255,255,255,0.5)">
    pip install xstate-statemachine
  </text>
</svg>
