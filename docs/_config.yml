title: XState-StateMachine for Python
description: The Complete State Machine Runtime — XState-Compatible, Production-Ready
url: "https://basiltt.github.io"
baseurl: "/xstate-statemachine"
remote_theme: pages-themes/cayman@v0.2.0

plugins:
  - jekyll-remote-theme

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM

highlighter: rouge

exclude:
  - superpowers/
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

collections:
  guide:
    output: true
    permalink: /guide/:name/
